version: 2
jobs:
  build:
    working_directory: ~/phone-book
    docker:
      - image: circleci/node:10.15.1
      - image: mongo:4.0.3
    steps:
      - attach_workspace:
          at: ~/phone-book
      - checkout
      - run:
          name: install-yarn
          command: yarn install
      - run:
          name: test
          command: yarn test
